# =============================================================================
# Afro Miaam — self-hosted stack (Hetzner VPS)
# =============================================================================
# Default services (always up):
#   postgres : data store, internal-only, runs migrations on first boot.
#   app      : Next.js standalone server, published on 127.0.0.1:3000 (loopback
#              only) so the SHARED EDGE proxy can reach it. Writes uploads vol.
#
# Optional service (profile "standalone"):
#   caddy    : single-site public edge. Use ONLY when this is the sole site on
#              the host (e.g. local/dev or a dedicated VPS). On a multi-site box
#              it MUST stay off — the shared edge (see ./edge/) owns 80/443.
#
# WHY: on a host running several compose projects, only ONE process can bind
# ports 80/443. Three per-project proxies fighting for them was the root cause
# of the intermittent outages. The fix is a single shared edge (./edge/) that
# routes every domain by Host header to each app on 127.0.0.1:<port>.
#
#   Multi-site (production):   docker compose up -d            # postgres + app
#                              (then deploy ./edge/ once for the whole host)
#   Single-site / dev:         docker compose --profile standalone up -d
#
# Secrets/config come from .env (see .env.example). On the VPS the image is
# pulled from GHCR by the CD pipeline; locally `docker compose build` works too.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — internal only (no published ports). Runs the schema
  # migration on first boot via /docker-entrypoint-initdb.d.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Match the app container so created_at / updated_at + the SETTINGS
      # check (and any future window functions) line up with the operator's
      # wall clock instead of UTC.
      TZ: ${TZ:-Europe/Paris}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # First-boot schema. The entrypoint only runs *.sql here when the data
      # directory is empty (i.e. a brand-new volume).
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      # Additive hardening (orders.idempotency_key, delivery_fee CHECK).
      # /docker-entrypoint-initdb.d/ runs files alphabetically on first boot
      # only — re-run manually on an existing volume:
      #   docker compose exec -T postgres psql -U "$$POSTGRES_USER" \
      #     -d "$$POSTGRES_DB" -f /docker-entrypoint-initdb.d/002_hardening.sql
      - ./migrations/002_hardening.sql:/docker-entrypoint-initdb.d/002_hardening.sql:ro
      # Extend orders.status whitelist with 'En Livraison' + 'Rejetée'.
      # Re-run on an existing volume:
      #   docker compose exec -T postgres psql -U "$$POSTGRES_USER" \
      #     -d "$$POSTGRES_DB" -f /docker-entrypoint-initdb.d/003_order_statuses.sql
      - ./migrations/003_order_statuses.sql:/docker-entrypoint-initdb.d/003_order_statuses.sql:ro
      # Extend settings.global with schedule (per-day-of-week hours), lead
      # time, and slot duration. Idempotent. Re-run on an existing volume:
      #   docker compose exec -T postgres psql -U "$$POSTGRES_USER" \
      #     -d "$$POSTGRES_DB" -f /docker-entrypoint-initdb.d/004_schedule.sql
      - ./migrations/004_schedule.sql:/docker-entrypoint-initdb.d/004_schedule.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Next.js app — built from the Dockerfile (standalone, non-root). Internal
  # only; Caddy is the sole public entry point. Writes uploaded menu images to
  # the shared `uploads` volume, which Caddy also reads (read-only) to serve.
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Pass the PUBLIC reCAPTCHA site key (and site URL) into the build so the
      # client bundle is inlined with the SAME key the server verifies against.
      # Compose substitutes ${...} from the project-dir .env file automatically.
      # Defaults match the Dockerfile fallbacks so a missing .env still builds.
      args:
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-6Lf7GessAAAAAGDZVnxZQoq9C4YN8hAUg8pMIZya}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://afromiaam.com}
    # The CD pipeline pulls this image from GHCR and runs `up -d --no-deps app`.
    # The repository slug is lower-cased to satisfy GHCR naming rules.
    image: ghcr.io/chesnel241/afro-miaam-restaurant:latest
    restart: unless-stopped
    env_file: .env
    environment:
      # Explicit operational defaults so a missing/incomplete .env doesn't
      # silently break things downstream. .env always wins (env_file is loaded
      # first, environment second — but compose's last-write-wins makes the
      # explicit ones override env_file for safety on critical flags).
      # - TZ          drives Date local-time arithmetic (schedule, slots).
      #               Defaults to Europe/Paris so the slot grid matches the
      #               restaurant's wall clock instead of the container's UTC.
      # - TRUSTED_PROXY tells clientIp() to read X-Forwarded-For from Caddy;
      #               without it, every customer collapses to one shared
      #               rate-limit bucket (denial of service surface).
      TZ: ${TZ:-Europe/Paris}
      TRUSTED_PROXY: ${TRUSTED_PROXY:-caddy}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      internal:
        ipv4_address: 10.200.0.10

  # ---------------------------------------------------------------------------
  # Caddy — SINGLE-SITE public edge (profile "standalone" only).
  #
  # Disabled by default. On a multi-site host this would fight the other
  # projects' proxies for ports 80/443 — the exact bug we fixed. Use the shared
  # ./edge/ stack instead, which owns 80/443 for the whole host. Enable this
  # only on a dedicated single-site box or for local testing:
  #     docker compose --profile standalone up -d
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2
    profiles: ["standalone"]
    restart: unless-stopped
    network_mode: "host"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Uploaded images, mounted read-only — Caddy file_servers /uploads/*.
      - uploads:/srv/uploads:ro
      - caddy_data:/data       # ACME certs & account keys (must persist!)
      - caddy_config:/config
      - caddy_logs:/var/log/caddy

# -----------------------------------------------------------------------------
# Networks — single private bridge for app <-> postgres only. The app is reached
# from the shared edge over the host loopback (127.0.0.1:3000), not this bridge.
# A small /24 (not /16) minimises the chance of overlapping another project's
# subnet — overlap was what broke Docker's embedded DNS earlier.
# -----------------------------------------------------------------------------
networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 10.200.0.0/24

# -----------------------------------------------------------------------------
# Named volumes — survive container recreation / redeploys.
# -----------------------------------------------------------------------------
volumes:
  pg_data:        # PostgreSQL data directory
  # Uploaded menu images. Explicit, project-independent name so the shared edge
  # stack (./edge/) can mount the SAME volume read-only to file_server
  # /uploads/* — the app writes here but does not serve these files itself.
  # NOTE: if you previously ran with the default name (e.g. afro-miaam_uploads),
  # migrate the data once — see ./edge/README.md.
  uploads:
    name: afro_miaam_uploads
  caddy_data:     # Let's Encrypt certs & ACME state (standalone profile only)
  caddy_config:   # Caddy autosave config (standalone profile only)
  caddy_logs:     # Access logs (standalone profile only)
